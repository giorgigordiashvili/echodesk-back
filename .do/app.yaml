name: echodesk-multitenant-api
services:
- name: web
  source_dir: /
  github:
    repo: giorgigordiashvili/echodesk-back
    branch: main
    deploy_on_push: true
  build_command: ./build_production.sh
  run_command: NEW_RELIC_CONFIG_FILE=newrelic.ini newrelic-admin run-program gunicorn --worker-tmp-dir /dev/shm --bind 0.0.0.0:8080 amanati_crm.wsgi:application
  environment_slug: python
  instance_count: 1
  instance_size_slug: basic-xxs
  routes:
  - path: /
  health_check:
    http_path: /api/docs/
  envs:
  - key: DEBUG
    value: "False"
  - key: ALLOWED_HOSTS
    value: "echodesk.ge,.echodesk.ge,.ondigitalocean.app"
  - key: MAIN_DOMAIN
    value: "echodesk.ge"
  - key: SECRET_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_NAME
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_USER
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_PASSWORD
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_HOST
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_PORT
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: NEW_RELIC_LICENSE_KEY
    scope: RUN_TIME
    type: SECRET
  - key: NEW_RELIC_CONFIG_FILE
    value: "newrelic.ini"
  - key: NEW_RELIC_LOG
    value: "stderr"
  - key: NEW_RELIC_LOG_LEVEL
    value: "debug"
  - key: NEW_RELIC_APP_NAME
    value: "EchoDesk Backend"
  - key: NEW_RELIC_HOST
    value: "collector.eu01.nr-data.net"
workers:
- name: celery-worker
  source_dir: /
  github:
    repo: giorgigordiashvili/echodesk-back
    branch: main
    deploy_on_push: true
  build_command: ./build_production.sh
  run_command: celery -A amanati_crm worker --loglevel=info --concurrency=2
  environment_slug: python
  instance_count: 1
  instance_size_slug: basic-xxs
  envs:
  - key: DEBUG
    value: "False"
  - key: SECRET_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_NAME
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_USER
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_PASSWORD
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_HOST
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_PORT
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: REDIS_HOST
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: REDIS_PORT
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: REDIS_PASSWORD
    scope: RUN_AND_BUILD_TIME
    type: SECRET
- name: celery-beat
  source_dir: /
  github:
    repo: giorgigordiashvili/echodesk-back
    branch: main
    deploy_on_push: true
  build_command: ./build_production.sh
  run_command: celery -A amanati_crm beat --loglevel=info
  environment_slug: python
  instance_count: 1
  instance_size_slug: basic-xxs
  envs:
  - key: DEBUG
    value: "False"
  - key: SECRET_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_NAME
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_USER
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_PASSWORD
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_HOST
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DB_PORT
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: REDIS_HOST
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: REDIS_PORT
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: REDIS_PASSWORD
    scope: RUN_AND_BUILD_TIME
    type: SECRET
