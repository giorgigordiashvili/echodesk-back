; =============================================================================
; EchoDesk PBX - Incoming Call Routing with Working Hours Support
; =============================================================================
; This replaces the [incoming] context in /etc/asterisk/extensions.conf
; It queries the EchoDesk CRM API to determine routing based on working hours.
;
; Dependencies:
;   - /var/lib/asterisk/agi-bin/echodesk-routing.py (AGI script)
;   - Environment variables: ECHODESK_API_URL, PBX_SHARED_SECRET
;
; Flow:
;   1. Answer incoming call
;   2. Run AGI script → queries EchoDesk API → sets channel variables
;   3. Route based on IS_WORKING:
;      - Working hours → play greeting → send to queue
;      - After hours → play announcement → voicemail/forward/hangup
;   4. Fallback: if AGI fails, default to queue with hardcoded greeting
; =============================================================================

[incoming]
exten => _X.,1,Answer()
 same => n,Wait(0.5)

 ; Query EchoDesk API via AGI
 same => n,AGI(echodesk-routing.py)

 ; Route based on working hours
 same => n,GotoIf($["${IS_WORKING}" = "true"]?working:after_hours)

 ; --- WORKING HOURS PATH ---
 same => n(working),NoOp(Working hours - routing to queue)

 ; Play greeting sound (from CRM or fallback to default)
 same => n,ExecIf($["${SOUND_GREETING}" != ""]?Playback(${SOUND_GREETING}))
 same => n,ExecIf($["${SOUND_GREETING}" = ""]?Playback(custom/default-greeting))

 ; Save caller number for post-call rating
 same => n,System(echo "${CALLERID(num)}" > /tmp/last_review_caller.txt)

 ; Start recording
 same => n,MixMonitor(/var/spool/asterisk/recording/${UNIQUEID}.wav,b)

 ; Send to queue
 ; QUEUE_NAME is set by the AGI from InboundRoute.destination_queue. Falls back
 ; to "support" when the API is unreachable or the DID isn't configured.
 same => n,Set(QUEUE_TO_DIAL=${IF($["${QUEUE_NAME}" != ""]?${QUEUE_NAME}:support)})
 same => n,Goto(queue-incoming,${EXTEN},1)

 ; --- AFTER HOURS PATH ---
 same => n(after_hours),NoOp(After hours - action: ${AFTER_HOURS_ACTION})

 ; Play after-hours announcement
 same => n,ExecIf($["${SOUND_AFTER_HOURS}" != ""]?Playback(${SOUND_AFTER_HOURS}))
 same => n,ExecIf($["${SOUND_AFTER_HOURS}" = ""]?Playback(custom/default-closed))

 ; Route based on after-hours action
 same => n,GotoIf($["${AFTER_HOURS_ACTION}" = "voicemail"]?voicemail)
 same => n,GotoIf($["${AFTER_HOURS_ACTION}" = "forward"]?forward)
 same => n,Hangup()

 ; --- VOICEMAIL ---
 same => n(voicemail),NoOp(Voicemail recording)
 same => n,ExecIf($["${SOUND_VOICEMAIL_PROMPT}" != ""]?Playback(${SOUND_VOICEMAIL_PROMPT}))
 same => n,ExecIf($["${SOUND_VOICEMAIL_PROMPT}" = ""]?Playback(custom/default-voicemail))
 same => n,VoiceMail(${EXTEN}@default,su)
 same => n,Hangup()

 ; --- FORWARD ---
 same => n(forward),NoOp(Forwarding to ${FORWARD_NUMBER})
 same => n,GotoIf($["${FORWARD_NUMBER}" = ""]?hangup)
 same => n,Dial(PJSIP/${FORWARD_NUMBER}@trunk-georgian,30)
 same => n(hangup),Hangup()


; =============================================================================
; Queue context (unchanged, but with dynamic hold music support)
; =============================================================================
[queue-incoming]
exten => _X.,1,NoOp(Entering queue ${QUEUE_TO_DIAL} for ${EXTEN})
 ; Use custom hold music URL if provided, otherwise default MOH class
 same => n,ExecIf($["${SOUND_QUEUE_HOLD}" != ""]?Set(CHANNEL(musicclass)=echodesk_custom))
 ; Dynamic queue name (set by [incoming] from QUEUE_NAME channel var).
 same => n,Queue(${QUEUE_TO_DIAL},tT,,,60)
 same => n,NoOp(Queue timeout - no agent answered)
 ; After queue timeout, play thank you and hangup
 same => n,ExecIf($["${SOUND_THANK_YOU}" != ""]?Playback(${SOUND_THANK_YOU}))
 same => n,Hangup()

